name: CI

on:
  workflow_call:

  pull_request:
    branches: [main, develop, 'release/*']

  push:
    branches: [main, develop, 'release/*']

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install hatch
        run: pip install hatch

      - name: Install dependencies
        run: |
          hatch run pip install -e '.[polars,duckdb,dask,ray,bigquery,snowflake,redshift,athena,trino,doris,dev]'

      - name: Run linter (ruff)
        run: hatch run ruff check . --exit-zero

      - name: Run type checker (mypy)
        run: hatch run mypy sumeh/ --ignore-missing-imports --no-error-summary || true

      - name: Run tests with coverage
        run: |
          hatch run pytest tests/ \
            --cov=sumeh \
            --cov-branch \
            --cov-report=xml \
            --cov-report=term

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Archive test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: |
            .pytest_cache/
            coverage.xml
          retention-days: 7
