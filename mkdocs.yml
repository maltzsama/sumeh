site_name: Sumeh DQ — Unified Data Quality Framework
site_description: "One API. Fifty-plus rules. Fourteen engines. Zero compromise."
site_author: "Demetrius Albuquerque, Otavio Lara"

theme:
  name: material
  logo: img/sumeh.svg
  favicon: img/favicon.png

  palette:
    - media: "(prefers-color-scheme: light)"
      logo: img/sumeh.svg
      primary: white
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      logo: img/sumeh.svg
      primary: black
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.indexes

plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_toc_entry: false
            show_signature_annotations: true
            line_length: 88
            merge_init_into_class: true
            separate_signature: true
            show_docstring_description: true
            show_private: true
            show_private_members: true

nav:
  - Home: 
    - index.md
    - Changelog: CHANGELOG.md
    - License: LICENSE.md
  - Quickstart: quickstart.md
  - CLI: sumeh/cli.md
  - Core API:
    - Rules & Definition: sumeh/core/rules.md
    - Validation Report: sumeh/core/validation.md
    - Data Profiling: sumeh/core/profiler.md
    - Schema Extraction: sumeh/core/schema.md
  - Engines:
    - Engine Overview: sumeh/engines/engines.md
    - Batch DataFrames:
      - Pandas: sumeh/engines/pandas.md
      - Polars: sumeh/engines/polars.md
      - PySpark: sumeh/engines/pyspark.md
      - Dask: sumeh/engines/dask.md
    - SQL Engines:
      - SQL Core & AST: sumeh/engines/sql_core.md
      - DuckDB: sumeh/engines/duckdb.md
      - BigQuery: sumeh/engines/bigquery.md
      - Snowflake: sumeh/engines/snowflake.md
      - Redshift: sumeh/engines/redshift.md
      - Athena: sumeh/engines/athena.md
      - Trino: sumeh/engines/trino.md
      - Apache Doris: sumeh/engines/doris.md
    - Streaming & ML:
      - PyFlink: sumeh/engines/pyflink.md
      - Ray Data: sumeh/engines/ray_data.md
  - Integrations:
    - OpenMetadata Exporter: sumeh/exporters/openmetadata.md
  - Generators: 
    - DDL & Transpiler: sumeh/generators.md

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - tables
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js